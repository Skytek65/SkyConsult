<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyConsult – Work In Progress</title>
  <meta name="description" content="SkyConsult – Coming soon. We're building something great." />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 600px;
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 1rem;
      color: #7ecfff;
    }

    h2 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.7;
      color: #cce7ff;
    }

    .badge {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.5rem 1.5rem;
      border: 2px solid #7ecfff;
      border-radius: 999px;
      font-size: 0.9rem;
      letter-spacing: 1px;
      color: #7ecfff;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="logo">SkyConsult</h1>
    <h2>Work In Progress</h2>
    <p>We're building something great. Check back soon!</p>
    <span class="badge">Coming Soon</span>
  </div>
</body>
</html>
